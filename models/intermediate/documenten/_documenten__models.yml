version: 2

models:
  - name: int_documenten_met_labels
    description: >
      Koppeling van documenten aan labels (tags). Geen aggregatie: de mart doet STRING_AGG.
      Documenten zonder labels komen hier niet voor.
      Grain: één rij per document × label.
    columns:
      - name: document_id
        description: "Verwijzing naar het document"
        tests: [not_null]
      - name: tag_id
        description: "Verwijzing naar de tag"
        tests: [not_null]
      - name: label_naam
        description: "Naam van het label"

  - name: int_documenten_met_status
    description: >
      Documenten verrijkt met leesbare statusomschrijving (lookup op lst_document_statuses).
      Grain: één rij per document.
    columns:
      - name: document_id
        description: "Verwijzing naar het document"
        tests: [unique, not_null]
      - name: status_code
        description: "Ruwe statuscode van het document"
      - name: status_omschrijving
        description: "Leesbare documentstatus (bijv. Opgeslagen, Gearchiveerd)"

  - name: int_documenten_met_rechten
    description: >
      Toegangsrechtclassificatie per document op basis van expertise-profielen en -groepen.
      afgeschermd_voor bepaald via EXISTS — geen aggregatie. Grain: één rij per document.
    columns:
      - name: document_id
        description: "Unieke identifier van het document"
        tests: [unique, not_null]
      - name: afgeschermd_voor
        description: "Classificatie: 'deskundigheid', 'deskundigheidsgroep', 'beiden' of 'geen'"
