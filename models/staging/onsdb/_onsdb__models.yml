version: 2

models:
  # -- Clienten --
  - name: stg_onsdb__clients
    description: "Gestaged overzicht van clienten uit Nedap Ons. Soft deletes gefilterd."
    columns:
      - name: client_id
        description: "Unieke identifier van de client (objectId)"
        tests: [unique, not_null]
      - name: voornaam
        description: "Voornaam van de client"
      - name: achternaam
        description: "Achternaam van de client"
      - name: geboortedatum
        description: "Geboortedatum van de client"
      - name: geslacht
        description: "Geslacht (Onbekend, Mannelijk, Vrouwelijk, Niet Gespecificeerd)"
      - name: burgerlijke_staat
        description: "Burgerlijke staat (integer enum)"
      - name: bsn
        description: "Burgerservicenummer"
      - name: emailadres
        description: "E-mailadres van de client"
      - name: mobiel_telefoonnummer
        description: "Mobiel telefoonnummer van de client"

  - name: stg_onsdb__relations
    description: "Contactpersonen en relaties van clienten."
    columns:
      - name: relatie_id
        description: "Unieke identifier van de relatie"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: naam
        description: "Naam van de relatie/contactpersoon"
      - name: is_noodcontact
        description: "Is dit een noodcontact (ICE)"

  # -- Medewerkers --
  - name: stg_onsdb__employees
    description: "Gestaged overzicht van medewerkers uit Nedap Ons. Soft deletes gefilterd."
    columns:
      - name: medewerker_id
        description: "Unieke identifier van de medewerker (objectId)"
        tests: [unique, not_null]
      - name: personeelsnummer
        description: "Identificatienummer van de medewerker (identificationNo)"
      - name: voornaam
        description: "Voornaam van de medewerker"
      - name: achternaam
        description: "Achternaam van de medewerker"
      - name: geboortedatum
        description: "Geboortedatum van de medewerker"
      - name: is_onderaannemer
        description: "Geeft aan of de medewerker een onderaannemer is"
      - name: gefiatteerd_tot_datum
        description: "Datum tot wanneer de zorgregels van deze medewerker gefiatteerd zijn"

  - name: stg_onsdb__contracts
    description: "Contracten van medewerkers met uren en looptijd."
    columns:
      - name: contract_id
        description: "Unieke identifier van het contract"
        tests: [unique, not_null]
      - name: medewerker_id
        description: "Verwijzing naar de medewerker"
        tests: [not_null]
      - name: startdatum
        description: "startdatum van het contract"
      - name: einddatum
        description: "Einddatum van het contract"
      - name: normtijd_uren_per_week
        description: "Normtijd in uren per week (vast)"
      - name: variabele_uren_per_week
        description: "Aantal variabele uren per week"

  - name: stg_onsdb__contract_types
    description: "Contracttypes (vast, variabel, etc.)."
    columns:
      - name: contracttype_id
        description: "Unieke identifier van het contracttype"
        tests: [unique, not_null]
      - name: contracttype_naam
        description: "Naam van het contracttype"

  # -- Teams & Organisatie --
  - name: stg_onsdb__teams
    description: "Teams binnen de organisatie."
    columns:
      - name: team_id
        description: "Unieke identifier van het team"
        tests: [unique, not_null]
      - name: teamnaam
        description: "Naam van het team"
      - name: is_poolteam
        description: "Wel of geen poolteam"

  - name: stg_onsdb__team_assignments
    description: "Koppelingen tussen medewerkers en teams."
    columns:
      - name: teamkoppeling_id
        description: "Unieke identifier van de teamkoppeling"
        tests: [unique, not_null]
      - name: medewerker_id
        description: "Verwijzing naar de medewerker"
        tests: [not_null]
      - name: team_id
        description: "Verwijzing naar het team"
        tests: [not_null]
      - name: startdatum
        description: "startdatum van geldigheid"
      - name: einddatum
        description: "Einddatum van geldigheid (tot en met)"

  # -- Locaties & Adressen --
  - name: stg_onsdb__addresses
    description: "Adressen gebruikt door clienten, medewerkers, locaties en teams."
    columns:
      - name: adres_id
        description: "Unieke identifier van het adres"
        tests: [unique, not_null]
      - name: adrestype_code
        description: "Code van het adrestype (integer enum; koppelt aan stg_onsdb__lst_address_types)"
      - name: straatnaam
        description: "Straatnaam"
      - name: huisnummer
        description: "Huisnummer"
      - name: postcode
        description: "Postcode"
      - name: plaatsnaam
        description: "Plaatsnaam"

  - name: stg_onsdb__clients_addresses
    description: "Koppeltabel tussen clienten en adressen."
    columns:
      - name: adres_id
        description: "Verwijzing naar het adres"
        tests: [not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]

  - name: stg_onsdb__lst_address_types
    description: "Lookup: adrestypen (GBA adres, Correspondentieadres, Verblijfadres, etc.)."
    columns:
      - name: adrestype_code
        description: "Code van het adrestype"
        tests: [unique, not_null]
      - name: adrestype
        description: "Beschrijving van het adrestype (bijv. GBA adres, Verblijfadres)"

  - name: stg_onsdb__locations
    description: "Locaties in de hierarchische locatiestructuur (locatiegram)."
    columns:
      - name: locatie_id
        description: "Unieke identifier van de locatie"
        tests: [unique, not_null]
      - name: locatienaam
        description: "Naam van de locatie"
      - name: ouder_locatie_id
        description: "Verwijzing naar de bovenliggende locatie (null voor rootlocaties)"
      - name: locatie_hierarchie_pad
        description: "Gematerialiseerd pad in de hiërarchie (bijv. .1.593.1234.)"
      - name: startdatum_locatie
        description: "Datum waarop de locatie actief werd"
      - name: einddatum_locatie
        description: "Datum waarop de locatie inactief werd (null = nog actief)"
      - name: is_intramuraal
        description: "Geeft aan of het om een intramurale locatie gaat"
      - name: capaciteit
        description: "Aantal clienten dat gekoppeld kan worden"

  - name: stg_onsdb__costcenter_assignments
    description: "Koppelingen tussen locaties en kostenplaatsen."
    columns:
      - name: kostenplaatskoppeling_id
        description: "Unieke identifier van de koppeling"
        tests: [unique, not_null]
      - name: locatie_id
        description: "Verwijzing naar de locatie"
        tests: [not_null]
      - name: kostenplaats_id
        description: "Verwijzing naar de kostenplaats (costcenterObjectId)"
        tests: [not_null]
      - name: startdatum
        description: "startdatum van de koppeling"
      - name: einddatum
        description: "Einddatum van de koppeling (null = nog actief)"

  - name: stg_onsdb__costcenters
    description: "Kostenplaatsen (voor koppeling met ORTEC)."
    columns:
      - name: kostenplaats_id
        description: "Unieke identifier van de kostenplaats"
        tests: [unique, not_null]
      - name: kostenplaats_code
        description: "Identificatienummer / code van de kostenplaats"
      - name: kostenplaats_naam
        description: "Naam van de kostenplaats"

  - name: stg_onsdb__location_assignments
    description: "Koppelingen tussen clienten en locaties."
    columns:
      - name: locatiekoppeling_id
        description: "Unieke identifier van de locatiekoppeling"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: locatie_id
        description: "Verwijzing naar de locatie"
        tests: [not_null]
      - name: type_toekenning
        description: "Type toekenning (MAIN, STANDARD, MEDICINE, GGZ of WAITING)"
      - name: is_verblijfslocatie
        description: "Of deze locatie de verblijfslocatie is van de client"

  # -- Zorg --
  - name: stg_onsdb__care_orders
    description: "Zorglegitimaties: autorisaties voor zorgverlening aan clienten."
    columns:
      - name: zorglegitimatie_id
        description: "Unieke identifier van de zorglegitimatie"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: zorglegitimatie_type
        description: "Type van de zorglegitimatie (integer enum)"
      - name: legitimatienummer
        description: "Nummer van de zorglegitimatie"
      - name: startdatum
        description: "startdatum van de zorglegitimatie"
      - name: einddatum
        description: "Einddatum van de zorglegitimatie"
      - name: ingangsdatum_geldig
        description: "Ingangsdatum rekening houdend met andere zorglegitimaties"
      - name: einddatum_geldig
        description: "Einddatum geldigheid rekening houdend met andere zorglegitimaties"

  - name: stg_onsdb__products
    description: "Productdefinities met code en omschrijving."
    columns:
      - name: product_id
        description: "Unieke identifier van het product"
        tests: [unique, not_null]
      - name: product_code
        description: "Korte weergave / code van het product"
      - name: product_omschrijving
        description: "Beschrijving van het product"

  - name: stg_onsdb__care_order_products
    description: "Producten gekoppeld aan zorglegitimaties."
    columns:
      - name: zorglegitimatie_product_id
        description: "Unieke identifier van het zorglegitimatie-product"
        tests: [unique, not_null]
      - name: zorglegitimatie_id
        description: "Verwijzing naar de zorglegitimatie"
        tests: [not_null]
      - name: hoeveelheid_in_minuten
        description: "Hoeveelheid in minuten (of awbz_klasse_id is gevuld)"

  - name: stg_onsdb__care_arrangements
    description: "Zorgarrangementen: afspraken over zorglevering per dagdeel."
    columns:
      - name: zorgarrangement_id
        description: "Unieke identifier van het zorgarrangement"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: minuten_ochtend
        description: "Aantal minuten zorg 's ochtends"
      - name: minuten_middag
        description: "Aantal minuten zorg 's middags"
      - name: minuten_avond
        description: "Aantal minuten zorg 's avonds"
      - name: minuten_nacht
        description: "Aantal minuten zorg 's nachts"

  - name: stg_onsdb__activities
    description: "Uursoorten/activiteiten voor gebruik in zorgarrangementen en zorgregels."
    columns:
      - name: activiteit_id
        description: "Unieke identifier van de activiteit"
        tests: [unique, not_null]
      - name: beschrijving
        description: "Beschrijving van de activiteit"
      - name: is_actief
        description: "Geeft aan of deze activiteit actief is"
      - name: is_direct
        description: "Geeft aan of dit een directe activiteit is"
      - name: is_reistijd
        description: "Geeft aan of deze activiteit reistijd is"
      - name: is_groepszorg
        description: "Geeft aan of deze activiteit wordt gebruikt voor groepszorg"

  # -- Zorgtoewijzingen --
  - name: stg_onsdb__care_allocations
    description: "Zorgtoewijzingen van clienten aan zorg."
    columns:
      - name: zorgtoewijzing_id
        description: "Unieke identifier van de zorgtoewijzing"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: startdatum
        description: "startdatum van de zorgtoewijzing"
      - name: einddatum
        description: "Einddatum van de zorgtoewijzing"
      - name: reden_uit_zorg
        description: "Reden waarom de client uit zorg is gegaan (outOfCareReason)"
      - name: bestemming_uit_zorg
        description: "Bestemming van de client na uitstroom (outOfCareDestination)"
      - name: opmerkingen
        description: "Vrij tekstveld met opmerkingen bij de zorgtoewijzing"

  # -- Zorgplannen --
  - name: stg_onsdb__careplans
    description: "Zorgplannen van clienten met raw statuscode."
    columns:
      - name: zorgplan_id
        description: "Unieke identifier van het zorgplan"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: startdatum
        description: "startdatum van het zorgplan"
      - name: einddatum
        description: "Einddatum van het zorgplan"
      - name: aangemaakt_door_id
        description: "Verwijzing naar de medewerker die het zorgplan heeft aangemaakt (employeeObjectId)"
      - name: status_code
        description: "Raw statuscode — resolv naar omschrijving via stg_onsdb__lst_care_plan_statuses"

  - name: stg_onsdb__lst_care_plan_statuses
    description: "Lookup: zorgplanstatuscodes met omschrijving."
    columns:
      - name: status_code
        description: "Raw statuscode"
        tests: [unique, not_null]
      - name: status_omschrijving
        description: "Leesbare omschrijving (bijv. Actief, Concept)"

  # -- Rapportages --
  - name: stg_onsdb__careplan_entries
    description: "Zorgplanregels (doelen en aandachtspunten) binnen een zorgplan."
    columns:
      - name: zorgplanregel_id
        description: "Unieke identifier van de zorgplanregel"
        tests: [unique, not_null]
      - name: zorgplan_id
        description: "Verwijzing naar het zorgplan"
        tests: [not_null]
      - name: zorgplanregel_link_id
        description: "Stabiele koppeling over kopieën heen (linkId). Als een regel gekopieerd wordt naar een nieuw zorgplan behouden beide regels hetzelfde linkId."
      - name: doeldefinitie_id
        description: "Verwijzing naar de doeldefinitie (careplan_target_definitions)"
      - name: aandachtspuntdefinitie_id
        description: "Verwijzing naar de aandachtspuntdefinitie (careplan_demand_definitions)"
      - name: doel_titel
        description: "Overschreven doeltitel (gevuld als is_titel_aanpasbaar = 1 op de doeldefinitie)"
      - name: doel_opmerking
        description: "Vrij tekstveld bij het doel"
      - name: streefdatum
        description: "Streefdatum voor het behalen van het doel"
      - name: percentage_gerealiseerd
        description: "Voortgangspercentage (0–100)"
      - name: aangemaakt_op
        description: "Tijdstip waarop de regel is aangemaakt"
      - name: gewijzigd_op
        description: "Tijdstip waarop de regel het laatst is bijgewerkt"

  - name: stg_onsdb__careplan_domain_definitions
    description: "Domeindefinities voor zorgplanregels. is_oud_domein = 1 betekent het oude domeinensysteem (Oud), 0 = nieuw systeem (Nieuw)."
    columns:
      - name: domein_definitie_id
        description: "Unieke identifier van de domeindefinitie"
        tests: [unique, not_null]
      - name: domein_naam
        description: "Naam van het domein"
      - name: is_oud_domein
        description: "1 = oud domeinensysteem (hidden), 0 = huidig systeem"
      - name: classificatie_id
        description: "Classificatie-ID van de domeindefinitie"

  - name: stg_onsdb__careplan_target_definitions
    description: "Doeldefinities gekoppeld aan een domein. Worden gebruikt als template voor zorgplanregels."
    columns:
      - name: doeldefinitie_id
        description: "Unieke identifier van de doeldefinitie"
        tests: [unique, not_null]
      - name: domein_definitie_id
        description: "Verwijzing naar het domein"
        tests: [not_null]
      - name: doel_naam
        description: "Naam van het doel (template-tekst)"
      - name: is_opmerking_toegestaan
        description: "1 als een vrij tekstveld bij het doel ingevuld mag worden"
      - name: is_voortgang_bijhouden
        description: "1 als voortgang (percentage) op dit doel vastgelegd kan worden"
      - name: is_titel_aanpasbaar
        description: "1 als de titel overschreven mag worden op zorgplanniveau"
      - name: is_verborgen
        description: "1 als de doeldefinitie verborgen/inactief is"
      - name: classificatie_id
        description: "Classificatie-ID van de doeldefinitie"

  - name: stg_onsdb__careplan_reports
    description: "Rapportages bij zorgplannen: tekstuele notities, SOEP-rapportages en metingen per cliënt."
    columns:
      - name: rapportage_id
        description: "Unieke identifier van de rapportage"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: medewerker_id
        description: "Verwijzing naar de medewerker die de rapportage heeft opgesteld"
      - name: rapportage_type_id
        description: "Verwijzing naar het type rapportage — resolv via stg_onsdb__careplan_report_types"
      - name: zorgplanregel_id
        description: "Verwijzing naar de zorgplanregel (carePlanEntryObjectId). Gebruik zorgplanregel_link_id voor stabielere koppeling bij kopiëren."
      - name: zorgplanregel_link_id
        description: "Stabiele koppeling naar de zorgplanregel over kopieën heen (carePlanLinkId). Gebruik dit veld bij voorkeur boven zorgplanregel_id."
      - name: rapportagedatum
        description: "Datum van de rapportage (kan handmatig ingevuld zijn, wijkt soms af van aangemaakt_op)"
      - name: opmerking
        description: "Vrij tekstveld — bij elk rapportage-type beschikbaar"
      - name: soep_subjectief
        description: "SOEP: subjectieve bevinding (alleen gevuld bij SOEP-rapportages)"
      - name: soep_objectief
        description: "SOEP: objectieve bevinding"
      - name: soep_evaluatie
        description: "SOEP: evaluatie / assessment"
      - name: soep_plan
        description: "SOEP: plan"
      - name: status_code
        description: "Status van de rapportage: open of closed"
      - name: is_gemarkeerd
        description: "1 als de medewerker de rapportage als belangrijk heeft gemarkeerd"
      - name: is_verborgen
        description: "1 als de rapportage verborgen is"
      - name: verbergingsreden
        description: "Reden waarom de rapportage verborgen is (alleen gevuld als is_verborgen = 1)"

  - name: stg_onsdb__careplan_report_types
    description: "Lookup: typen rapportages bij zorgplannen."
    columns:
      - name: rapportage_type_id
        description: "Unieke identifier van het type"
        tests: [unique, not_null]
      - name: rapportage_type
        description: "Naam van het rapportage-type"

  # -- Dossier: episodes & documenten --
  - name: stg_onsdb__dossier_episodes
    description: "Episodes (zorgtrajecten) in het cliëntdossier, met doelen en looptijd."
    columns:
      - name: episode_id
        description: "Unieke identifier van de episode"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: titel
        description: "Titel van de episode"
      - name: startdatum
        description: "Startdatum van de episode"
      - name: einddatum
        description: "Einddatum van de episode (null = nog actief)"
      - name: evaluatiedatum
        description: "Geplande evaluatiedatum"
      - name: doel
        description: "Beschrijving van het doel van de episode"
      - name: is_gemarkeerd
        description: "1 als de episode als relevant gemarkeerd is"
      - name: is_belangrijk
        description: "1 als de episode als belangrijk aangemerkt is"
      - name: aangemaakt_door_id
        description: "Verwijzing naar de medewerker die de episode heeft aangemaakt"
      - name: gewijzigd_door_id
        description: "Verwijzing naar de medewerker die de episode het laatst heeft gewijzigd"

  - name: stg_onsdb__dossier_episode_sub_goals
    description: "Subdoelen gekoppeld aan episodes in het cliëntdossier."
    columns:
      - name: episode_subdoel_id
        description: "Unieke identifier van het subdoel"
        tests: [unique, not_null]
      - name: episode_id
        description: "Verwijzing naar de episode"
        tests: [not_null]
      - name: titel
        description: "Titel van het subdoel"
      - name: is_gearchiveerd
        description: "1 als het subdoel gearchiveerd is"

  - name: stg_onsdb__dossier_episode_actions
    description: "Acties gekoppeld aan episode-subdoelen."
    columns:
      - name: episode_actie_id
        description: "Unieke identifier van de actie"
        tests: [unique, not_null]
      - name: episode_subdoel_id
        description: "Verwijzing naar het episode-subdoel"
        tests: [not_null]
      - name: titel
        description: "Titel van de actie"
      - name: tonen_in_zorgplan
        description: "1 als de actie zichtbaar is in het zorgplan"
      - name: is_gearchiveerd
        description: "1 als de actie gearchiveerd is"

  - name: stg_onsdb__documents
    description: "Metadata van documenten (bijlagen) gekoppeld aan cliënten. De bestandsinhoud zelf is niet beschikbaar via OnsDB."
    columns:
      - name: document_id
        description: "Unieke identifier van het document"
        tests: [unique, not_null]
      - name: client_id
        description: "Verwijzing naar de client"
        tests: [not_null]
      - name: medewerker_id
        description: "Verwijzing naar de medewerker die het document heeft geüpload"
      - name: beschrijving
        description: "Omschrijving van het document"
      - name: bestandsnaam
        description: "Bestandsnaam van het document"
      - name: status_code
        description: "Status: 0=Nieuw, 2=Opgeslagen, 3=Verwijderd, 4=Purged, 5=Fout, 6=Gearchiveerd"
      - name: is_vertrouwelijk
        description: "1 als het document alleen zichtbaar is voor een beperkte groep"
      - name: aangemaakt_op
        description: "Tijdstip waarop het document is aangemaakt"
      - name: gewijzigd_op
        description: "Tijdstip waarop het document het laatst is bijgewerkt"

  - name: stg_onsdb__document_tags
    description: "Koppeltabel tussen documenten en tags/labels."
    columns:
      - name: document_id
        description: "Verwijzing naar het document"
        tests: [not_null]
      - name: tag_id
        description: "Verwijzing naar de tag"
        tests: [not_null]

  - name: stg_onsdb__tags
    description: "Tags (labels) die aan documenten gekoppeld kunnen worden."
    columns:
      - name: tag_id
        description: "Unieke identifier van de tag"
        tests: [unique, not_null]
      - name: label_naam
        description: "Naam van de tag"

  - name: stg_onsdb__document_rights
    description: "Toegangsrechten per document op basis van deskundigheid (expertise-profiel)."
    columns:
      - name: document_id
        description: "Verwijzing naar het document"
        tests: [not_null]
      - name: deskundigheid_id
        description: "Verwijzing naar de deskundigheid die toegang heeft (educationObjectId)"
        tests: [not_null]

  - name: stg_onsdb__document_deskundigheidsgroepen
    description: "Toegangsbeperking per document op basis van deskundigheidsgroep."
    columns:
      - name: document_id
        description: "Verwijzing naar het document"
        tests: [not_null]
      - name: deskundigheidsgroep_id
        description: "Verwijzing naar de deskundigheidsgroep die toegang heeft"
        tests: [not_null]

  - name: stg_onsdb__lst_document_statuses
    description: "Lookup: mogelijke documentstatussen."
    columns:
      - name: status_code
