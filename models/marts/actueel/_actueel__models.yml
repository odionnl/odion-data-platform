version: 2

models:
  - name: mart_clienten_actueel
    description: >
      Snapshot: cliënten die vandaag in zorg zijn, verrijkt met huidige
      hoofdlocatie en primaire financieringsvorm. View op mart_clienten.
    columns:
      - name: hoofdlocatie_id
        description: "Locatie-ID van de huidige hoofdlocatie (type MAIN)"
      - name: hoofdlocatienaam
        description: "Naam van de huidige hoofdlocatie"
      - name: financiering
        description: "Primaire financieringsvorm op basis van actieve zorglegitimaties (bijv. Zorgzwaartepakket)"

  - name: mart_medewerkers_actueel
    description: >
      Snapshot: alleen medewerkers met een actief contract vandaag.
      View op mart_medewerkers met filter is_actief = 1.

  - name: mart_wachtlijsten_actueel
    description: >
      Snapshot: alleen actieve (lopende) wachtlijstkoppelingen.
      View op mart_wachtlijsten met filter is_actief = 1.

  - name: mart_locaties_actueel
    description: >
      Snapshot: alleen locaties die vandaag actief zijn.
      View op mart_locaties met filter is_actief = 1.

  - name: mart_zorglegitimaties_actueel
    description: >
      Snapshot: alleen actieve zorglegitimaties.
      View op mart_zorglegitimaties met filter is_actief = 1.

  - name: mart_zorglegitimatie_producten_actueel
    description: >
      Snapshot: alleen actieve zorglegitimatie-producten.
      View op mart_zorglegitimatie_producten met filter is_actief = 1.
