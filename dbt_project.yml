name: 'odion_data_platform'
version: '1.0.0'

require-dbt-version: [">=1.7.0", "<2.0.0"]

profile: 'odion_data_platform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

vars:
  evaluatieperiode_dagen: 28

clean-targets:
  - "target"
  - "dbt_packages"

models:
  odion_data_platform_cc:
    staging:
      +materialized: view
      +schema: staging
      ortec:
        +materialized: view
        +schema: staging
      ons_audits:
        +materialized: view
        +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
      verantwoording:
        +materialized: view
        +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
